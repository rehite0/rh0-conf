#@~/.config/tmux/tmux.conf
unbind C-b
set -g prefix `
bind ` send-prefix

bind R source-file  ~/.config/tmux/tmux.conf
set -g default-terminal "bash"
set -g editor "nvim"
set -g mouse on

#navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
#binding
bind n split-window -h
bind v split-window -v
bind-key @ break-pane
bind-key q kill-pane
unbind !
bind-key ! kill-window

setw -g mode-keys vi
#plugin
set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'

set -g @plugin 'tmux-plugins/tmux-sensible'

set-option -g @plugin 'b0o/tmux-autoreload'
set-option -g @tmux-autoreload-configs '~/.config/tmux/tmux.conf'

set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark256' # or 'dark256', 'light', 'light256'


set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -g default-terminal "${TERM}"
#panal
set -g pane-border-lines simple
# set -g pane-border-style fg=#fbf3c7,
# set -g pane-active-border-style fg=#a89984

#status
# set -g	status-style bg=default,fg=#a89984
